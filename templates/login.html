<!-- login.html -->

{% extends "layout.html" %}

{% block content %}
<section id="authentication">
    <header>
        <h2>Login</h2>
    </header>
</section>

<div>
    <!-- Form for user login -->
    <form action="{{ url_for('login') }}" method="post">
        <dl>
            <dt>
                <!-- Input field for the username -->
                <label for="username">Username:</label>
            </dt>
            <dd>
                <!-- Pre-fills the username field with the previously entered value if the form was submitted -->
                <input type="text" name="username" 
                       value="{{ request.form['username'] if request.form else '' }}" 
                       size="50" required>
            </dd>

            <dt>
                <!-- Input field for the password -->
                <label for="password">Password:</label>
            </dt>
            <dd>
                <input type="password" name="password" size="50" required>
            </dd>
        </dl>
        <fieldset>
            <!-- Submit button to log in -->
            <input type="submit" value="Login">
            
            <!-- Link to the registration page -->
            <a href="{{ url_for('register') }}">Don't have an account? Register</a>
        </fieldset>
    </form>
</div>
{% endblock %}
