<!-- name.html -->

{% extends "layout.html" %}

{% block content %}
<!-- Display the name of the person -->
<h2>{{ name }}</h2>

<div>
  <ul class="gift-list">
    <!-- Loop through the list of gift ideas -->
    {% for item in gift_lst %}
      <!-- Display each gift idea as a list item -->
      <li>{{ item }}</li>
    {% endfor %}
  </ul>
</div>

<div class="edit-name-and-gifts">
  <!-- Buttons to edit the name and gifts -->
  <p><a class="action-button" href="{{ url_for('edit_name', id=id) }}">Edit Name</a></p>
  <p><a class="action-button" href="{{ url_for('edit_gifts', id=id) }}">Edit Gifts</a></p>
</div>
<div class="delete-person">
  <p>
    <form action="{{ url_for('delete_person', id=id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this person?');" style="display: inline;">
      <button type="submit" class="action-button">Delete Person</button>
    </form>
  </p>
</div>
{% endblock %}
