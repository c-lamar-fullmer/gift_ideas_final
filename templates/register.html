<!-- register.html -->

{% extends "layout.html" %} <!-- This template extends the base layout.html file -->

{% block content %}
<section id="authentication">
    <header>
        <h2>Register</h2> <!-- Page header for the registration form -->
    </header>
</section>

<div>
    <!-- Form to handle user registration -->
    <form action="{{ url_for('register') }}" method="post">
        <dl>
            <!-- Input field for the username -->
            <dt>
                <label for="username">Username:</label>
            </dt>
            <dd>
                <input type="text" name="username" 
                       value="{{ request.form['username'] if request.form else '' }}" 
                       size="50" required>
                <!-- Pre-fills the username field with the previously entered value if the form was submitted -->
            </dd>

            <!-- Input field for the password -->
            <dt>
                <label for="password">Password:</label>
            </dt>
            <dd>
                <input type="password" name="password" size="50" required>
                <!-- Password field does not pre-fill for security reasons -->
            </dd>

            <!-- Input field to confirm the password -->
            <dt>
                <label for="confirm_password">Confirm Password:</label>
            </dt>
            <dd>
                <input type="password" name="confirm_password" size="50" required>
                <!-- Ensures the user confirms their password -->
            </dd>
        </dl>
        <fieldset>
            <!-- Submit button to register the user -->
            <input type="submit" value="Register">
            
            <!-- Link to the login page for users who already have an account -->
            <a href="{{ url_for('login') }}">Already have an account? Login</a>
        </fieldset>
    </form>
</div>
{% endblock %}
